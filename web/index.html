<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式任务协同 - 云平台</title>
    <style>
            body {
                font-family: Arial, sans-serif;
            }

            .toast {
                visibility: hidden;
                min-width: 250px;
                margin-left: -125px;
                background-color: transparent; /* 背景透明 */
                color: #f00;
                text-align: center;
                padding: 16px;
                position: fixed;
                z-index: 1;
                left: 50%;
                bottom: 30px;
                font-size: 17px;
                border: 2px solid #333; /* 添加边框 */
                border-radius: 12px; /* 圆角效果 */
            }

            .toast.show {
                visibility: visible;
                animation: fadeInOut 3s ease-out;
            }

            @keyframes fadeInOut {
                0% { opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 1; }
                100% { opacity: 0; }
            }
    </style>
    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        function showToast(message) {
            var toast = document.getElementById("toast");
            toast.textContent = message; // Update toast message
            toast.classList.add("show");

            setTimeout(function() {
                toast.classList.remove("show");
            }, 3000); // Toast will disappear after 3 seconds
        }

        async function checkToken() {
            try {
                const token = getCookie('token'); // 从 cookie 中获取 token
                const response = await fetch('/iam/api/v1/tokens/validate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // 使用 Bearer token 进行授权
                    },
                    body: JSON.stringify({ token: token }) // 发送 token
                });

                if (!response.ok) {
                    showToast('Session expired or invalid token!');
                    setTimeout(() => {
                        window.location.href = 'login.html'; // 5秒后跳转到登录页
                    }, 5000);
                }
            } catch (error) {
                console.error('检查 token 时出错:', error);
                window.location.href = 'login.html'; // 在出现错误时也跳转
            }
        }

        window.onload = checkToken;
    </script>
</head>
<body>
<div class="container">
    <h1>欢迎来到主页面</h1>
    <p>这是用户登录后看到的内容。</p>
</div>
<div id="toast" class="toast">This is a toast message</div>
</body>
</html>
