<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        async function checkToken() {
            try {
                const token = getCookie('token'); // 从 cookie 中获取 token
                const response = await fetch('/iam/api/v1/tokens/validate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // 使用 Bearer token 进行授权
                    },
                    body: JSON.stringify({ token: token }) // 发送 token
                });

                if (!response.ok) {
                    // 如果响应不是 200 OK，跳转到登录页面
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('检查 token 时出错:', error);
                window.location.href = 'login.html'; // 在出现错误时也跳转
            }
        }

        // 页面加载时检查 token
        window.onload = checkToken;
    </script>
</head>
<body>
<div class="container">
    <h1>欢迎来到主页面</h1>
    <p>这是用户登录后看到的内容。</p>
</div>
</body>
</html>
