<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式任务协同 - 云平台</title>
    <link rel="icon" href="assets/images/owl.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/styles_iam.css">
    <link rel="stylesheet" href="css/styles_toast.css">
    <link rel="stylesheet" href="css/styles_footer.css">
    <script src="js/iam.js"></script>
    <script>
        function showToast(message) {
            var toast = document.getElementById("toast");
            toast.textContent = message; // Update toast message
            toast.classList.add("show");

            setTimeout(function() {
                toast.classList.remove("show");
            }, 3000); // Toast will disappear after 3 seconds
        }

        async function checkToken() {
            try {
                const token = getCookie('refresh_token');
                const response = await fetch('/iam/api/v1/tokens/validate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // 使用 Bearer token 进行授权
                    },
                    body: JSON.stringify({ token: token }) // 发送 token
                });

                if (!response.ok) {
                    showToast('Session expired or invalid token!');
                    setTimeout(() => {
                        window.location.href = 'login.html'; // 5秒后跳转到登录页
                    }, 5000);
                }
            } catch (error) {
                console.error('检查 token 时出错:', error);
                showToast('检查 token 时出错');
                setTimeout(() => {
                    window.location.href = 'login.html'; // 在出现错误时也跳转
                }, 20000);

            }

            // load user info
            const userName = "John Doe";  // 可更改为 "John Doe" 测试英文支持
            const shortName = getInitials(userName);
            document.getElementById('user-initials').textContent = shortName;
        }

        window.onload = checkToken;
    </script>
</head>
<body>
    <div class="header">
        <div class="user-initials" id="user-initials"></div>
    </div>
    <div class="container">
        <h1>欢迎来到主页面</h1>
        <p>这是用户登录后看到的内容。</p>
    </div>
<!--    <div id="toast" class="toast">This is a toast message</div>-->
    <footer class="footer">
        <a href="https://beian.miit.gov.cn/" target="_blank">京ICP备2024094052号</a>
    </footer>
</body>
</html>
