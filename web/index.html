<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式任务协同 - 云平台</title>
    <link rel="icon" href="assets/images/owl.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/iam.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/menu.css">
    <script src="js/iam.js"></script>
    <script src="js/toast.js"></script>
    <script>
        async function checkToken() {
            try {
                const token = getCookie('refresh_token'); // 从 Cookie 中获取 refresh_token
                console.log('getCookie token:', token);

                if (!token) {
                    showToast('Token not found! Redirecting to login.');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 5000);
                    return;
                }

                const response = await fetch('/iam/api/v1/tokens/validate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // 使用 Bearer token 进行授权
                    },
                    body: JSON.stringify({ token }) // 发送 token
                });

                if (!response.ok) {
                    const errorMessage = await response.text(); // 捕获服务端返回的错误消息
                    console.error('Token validation failed:', errorMessage);
                    showToast('Session expired or invalid token! Redirecting to login.');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 20000);
                    return;
                }

                const json = await response.json();
                console.log('response.json data:', json);
                const name = json.data.name; // 从响应中提取用户名

                if (!name) {
                    throw new Error('Invalid server response: Missing name');
                }

                const shortName = getInitials(name); // 使用辅助函数生成缩写
                document.getElementById('user-initials').textContent = shortName; // 更新页面显示
            } catch (error) {
                console.error('检查 token 时出错:', error);
                showToast('Error checking token. Redirecting to login.');
                setTimeout(() => {
                    window.location.href = 'login.html'; // 在出现错误时也跳转
                }, 20000);
            }
        }


        function toggleMenu() {
            const menu = document.getElementById('user-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        async function logout() {
            try {
                const token = getCookie('refresh_token');
                if (!token) {
                    showToast('Token not found! Redirecting to login.');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 5000);
                    return;
                }

                if (token) {
                    const response = await fetch('/iam/api/v1/tokens', {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}` // 使用 Bearer token 进行授权
                        },
                        body: JSON.stringify({ token }) // 发送 token
                    });
                    if (!response.ok) {
                        throw new Error(`Logout failed: ${response.statusText}`);
                    }
                }

                document.cookie = "refresh_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                document.cookie = "access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

                showToast('Logging out...');

                // 跳转到登录页面
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                console.error('Logout error:', error);
                showToast('Error during logout.');
            }
        }

        window.onload = checkToken;

        // 点击页面其他地方关闭菜单
        window.addEventListener('click', (e) => {
            const menu = document.getElementById('user-menu');
            const initials = document.getElementById('user-initials');
            if (!menu.contains(e.target) && e.target !== initials) {
                menu.style.display = 'none';
            }
        });
    </script>
</head>
<body>
    <div class="header">
        <div class="user-initials" id="user-initials" onclick="toggleMenu()" title="点击查看菜单"></div>
        <div class="menu" id="user-menu">
            <div class="menu-item" onclick="logout()">退出登录</div>
        </div>
    </div>
    <div class="container">
        <h1>欢迎来到主页面</h1>
        <p>这是用户登录后看到的内容。</p>
    </div>
    <div id="toast" class="toast">This is a toast message</div>
    <footer class="footer">
        <a href="https://beian.miit.gov.cn/" target="_blank">京ICP备2024094052号</a>
    </footer>
</body>
</html>
