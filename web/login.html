<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link rel="icon" href="assets/images/owl.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/footer.css">
    <script src="js/iam.js"></script>
</head>
<body>
<div class="container">
    <h2>用户登录</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="name">用户名</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">登录</button>
    </form>
    <div class="register-link">
        <p>还没有账户？ <a href="/register.html">注册</a></p>
    </div>
</div>
<!-- Footer with ICP number -->
<footer class="footer">
    <a href="https://beian.miit.gov.cn/" target="_blank">京ICP备2024094052号</a>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const name = document.getElementById('name').value.trim();
            const password = document.getElementById('password').value.trim();

            // 检查输入是否为空
            if (!name || !password) {
                alert('用户名或密码不能为空');
                return;
            }

            try {
                const response = await fetch('/iam/api/v1/tokens', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, password })
                });

                const data = await handleResponse(response);

                if (data) {
                    const { refresh_token, access_token, expires_at } = data || {};

                    // 验证数据是否完整
                    if (!refresh_token || !access_token || !expires_at) {
                        console.error('Invalid token data:', data);
                        return;
                    }

                    const expires = new Date(expires_at).toUTCString();
                    console.log('refresh_token:', refresh_token);
                    console.log('access_token:', access_token);

                    // 设置安全 Cookie
                    setCookie('refresh_token', refresh_token, {
                        expires,
                        path: '/',
                        secure: true,
                        sameSite: 'Strict',
                    });
                    setCookie('access_token', access_token, {
                        expires,
                        path: '/',
                        secure: true,
                        sameSite: 'Strict',
                    });

                    // 检查是否已设置 refresh_token
                    const refreshToken = getCookie('refresh_token');
                    if (!refreshToken) {
                        console.warn('User not logged in. Redirecting to login page.');
                        window.location.href = 'login.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }
            } catch (error) {
                alert('网络异常，请检查您的网络连接。');
                console.error('请求错误：', error);
            }
        });

        async function handleResponse(response) {
            const responseData = await response.json();
            if (response.ok) {
                return responseData.data;
            } else {
                alert('登录失败：' + (responseData.Msg || '用户名或密码错误'));
                throw new Error(responseData.Msg || '请求失败');
            }
        }
    });
</script>
</body>
</html>
