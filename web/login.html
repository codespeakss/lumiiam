<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link rel="icon" href="assets/images/owl.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/styles_login.css">
    <link rel="stylesheet" href="css/styles_footer.css">
</head>
<body>
<div class="container">
    <h2>用户登录</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="name">用户名</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">登录</button>
    </form>
    <div class="register-link">
        <p>还没有账户？ <a href="/register.html">注册</a></p>
    </div>
</div>
<!-- Footer with ICP number -->
<footer class="footer">
    <a href="https://beian.miit.gov.cn/" target="_blank">京ICP备2024094052号</a>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const name = document.getElementById('name').value.trim();
            const password = document.getElementById('password').value.trim();

            // 检查输入是否为空
            if (!name || !password) {
                alert('用户名或密码不能为空');
                return;
            }

            try {
                const response = await fetch('/iam/api/v1/tokens', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, password })
                });

                const data = await handleResponse(response);

                if (data) {
                    const { refresh_token, access_token, expires_at } = data;
                    const expires = new Date(expires_at).toUTCString();

                    // 设置安全 Cookie
                    document.cookie = `refresh_token=${refresh_token}; Secure; HttpOnly; SameSite=Strict; path=/; expires=${expires}`;
                    document.cookie = `access_token=${access_token}; Secure; HttpOnly; SameSite=Strict; path=/; expires=${expires}`;

                    window.location.href = 'index.html';
                }
            } catch (error) {
                alert('网络异常，请检查您的网络连接。');
                console.error('请求错误：', error);
            }
        });

        async function handleResponse(response) {
            const responseData = await response.json();
            if (response.ok) {
                return responseData.data;
            } else {
                alert('登录失败：' + (responseData.Msg || '用户名或密码错误'));
                throw new Error(responseData.Msg || '请求失败');
            }
        }
    });
</script>
</body>
</html>
