<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .register-link {
            text-align: center;
            margin-top: 15px;
        }
        .register-link a {
            color: #007bff;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>用户登录</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">登录</button>
    </form>
    <div class="register-link">
        <p>还没有账户？ <a href="/register.html">注册</a></p>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault(); // 防止默认提交

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/iam/api/v1/tokens', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        if (response.ok) { // 如果响应状态为 200
            const resp = await response.json(); // 获取返回的 JSON
            const token = resp.data.token; // 获取 token，假设返回结构为 { "data": { "token": "your_token" } }
            const timeout = resp.data.tiemout;

            // 将 token 写入 cookie，设置有效期为 7 天
            const expires = new Date(Date.now() + timeout * 1000).toUTCString(); // timeout 秒后过期
            document.cookie = `token=${token}; expires=${expires}; path=/;`;

            window.location.href = 'index.html'; // 跳转至 index.html
        } else {
            const errorResponse = await response.json();
            alert('登录失败：' + (errorResponse.Msg || '用户名或密码错误'));
        }
    });
</script>


</body>


</html>
